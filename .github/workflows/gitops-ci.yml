name: gitops-ci

on:
  pull_request:
    paths:
      - "gitops/**"
      - "scripts/argocd.sh"
      - "scripts/istio.sh"
      - "scripts/platform.sh"
      - "scripts/observability.sh"
      - "scripts/incident.sh"
      - "scripts/fault.sh"
      - "ai_copilot/**"
      - "examples/**"
      - "config/traffic-weights.env"
      - "Makefile"
      - ".github/workflows/gitops-ci.yml"
  push:
    branches:
      - main
    paths:
      - "gitops/**"
      - "scripts/argocd.sh"
      - "scripts/istio.sh"
      - "scripts/platform.sh"
      - "scripts/observability.sh"
      - "scripts/incident.sh"
      - "scripts/fault.sh"
      - "ai_copilot/**"
      - "examples/**"
      - "config/traffic-weights.env"
      - "Makefile"
      - ".github/workflows/gitops-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.35.0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Render bootstrap manifests
        run: |
          workload_manifest="$(mktemp)"
          observability_policy_manifest="$(mktemp)"
          trap 'rm -f "$workload_manifest" "$observability_policy_manifest"' EXIT
          kubectl kustomize gitops/bootstrap/argocd/config >/dev/null
          kubectl kustomize gitops/mesh/bootstrap >/dev/null
          kubectl kustomize gitops/mesh/policy >/dev/null
          kubectl kustomize gitops/workloads/bootstrap >/dev/null
          kubectl kustomize gitops/workloads/platform-api >"$workload_manifest"
          kubectl kustomize gitops/observability/bootstrap >/dev/null
          kubectl kustomize gitops/observability/policy >"$observability_policy_manifest"
          grep -q -- '--udp-port=8081' "$workload_manifest"
          grep -q -- 'maxSurge: 0' "$workload_manifest"
          grep -q -- 'maxUnavailable: 1' "$workload_manifest"
          grep -q 'kind: PrometheusRule' "$observability_policy_manifest"
          grep -q 'PlatformApiAvailabilityBudgetFastBurn' "$observability_policy_manifest"
          grep -q 'PlatformApiAvailabilityBudgetSlowBurn' "$observability_policy_manifest"
          grep -q 'PlatformApiLatencyObjectiveAtRisk' "$observability_policy_manifest"
          grep -q 'PlatformApiLatencyDemo' "$observability_policy_manifest"

      - name: Render Istio chart values
        run: |
          istiod_manifest="$(mktemp)"
          trap 'rm -f "$istiod_manifest"' EXIT
          helm repo add istio https://istio-release.storage.googleapis.com/charts
          helm template istiod istio/istiod \
            --version 1.30.3 \
            --namespace istio-system \
            --values gitops/mesh/helm/istiod-values.yaml >"$istiod_manifest"
          grep -q 'otel-tracing' "$istiod_manifest"
          grep -q 'otel-collector.observability.svc.cluster.local' "$istiod_manifest"
          helm template istio-ingress istio/gateway \
            --version 1.30.3 \
            --namespace istio-ingress \
            --values gitops/mesh/helm/gateway-values.yaml >/dev/null

      - name: Render observability chart values
        run: |
          prometheus_manifest="$(mktemp)"
          collector_manifest="$(mktemp)"
          tempo_manifest="$(mktemp)"
          trap 'rm -f "$prometheus_manifest" "$collector_manifest" "$tempo_manifest"' EXIT
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add grafana-community https://grafana-community.github.io/helm-charts
          helm template observability prometheus-community/kube-prometheus-stack \
            --version 87.17.0 \
            --namespace observability \
            --values gitops/observability/helm/kube-prometheus-stack-values.yaml \
            --set-string prometheus.prometheusSpec.externalLabels.cluster=ci >"$prometheus_manifest"
          alertmanager_config="$(
            awk '$1 == "alertmanager.yaml:" {print $2; exit}' "$prometheus_manifest" |
              tr -d '"' |
              base64 --decode
          )"
          helm template otel-collector open-telemetry/opentelemetry-collector \
            --version 0.165.0 \
            --namespace observability \
            --values gitops/observability/helm/otel-collector-values.yaml >"$collector_manifest"
          helm template tempo grafana-community/tempo \
            --version 2.2.3 \
            --namespace observability \
            --values gitops/observability/helm/tempo-values.yaml >"$tempo_manifest"
          grep -q 'cluster: ci' "$prometheus_manifest"
          grep -q 'kind: Alertmanager' "$prometheus_manifest"
          grep -q 'retention: 6h' "$prometheus_manifest"
          grep -q 'receiver: slo-null' <<<"$alertmanager_config"
          grep -q 'tempo.observability.svc.cluster.local:4317' "$collector_manifest"
          grep -q 'reporting_enabled: false' "$tempo_manifest"

      - name: Check the bootstrap script
        run: |
          bash -n scripts/argocd.sh
          bash -n scripts/istio.sh
          bash -n scripts/platform.sh
          bash -n scripts/observability.sh
          bash -n scripts/incident.sh
          bash -n scripts/fault.sh
          shellcheck scripts/argocd.sh
          shellcheck scripts/istio.sh
          shellcheck scripts/platform.sh
          shellcheck scripts/observability.sh
          shellcheck scripts/incident.sh
          shellcheck scripts/fault.sh

      - name: Replay incident policy
        run: |
          make incident-replay
          make incident-proposal
          make incident-reject-unsafe

      - name: Check repository publication
        run: ./scripts/verify-repository.sh
