apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-mesh-security-manager
  namespace: platform
rules:
  - apiGroups:
      - security.istio.io
    resources:
      - peerauthentications
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-mesh-security-manager
  namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-mesh-security-manager
subjects:
  - kind: ServiceAccount
    name: argocd-application-controller
    namespace: argocd
