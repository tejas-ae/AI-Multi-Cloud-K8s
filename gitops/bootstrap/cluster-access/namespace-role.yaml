apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-manager-bootstrap
  namespace: argocd
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - appprojects
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
