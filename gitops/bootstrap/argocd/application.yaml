apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-bootstrap
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ai-multicloud-k8s
spec:
  project: default
  source:
    repoURL: https://github.com/tejas-ae/AI-Multi-Cloud-K8s.git
    targetRevision: main
    path: gitops/bootstrap/argocd/config
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
