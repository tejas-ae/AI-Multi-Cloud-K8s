alertmanager:
  enabled: false

defaultRules:
  create: false

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  ingress:
    enabled: false
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  additionalDataSources:
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.observability.svc.cluster.local:3200
      jsonData:
        tracesToMetrics:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 96Mi

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 6h
    scrapeInterval: 15s
    evaluationInterval: 15s
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector:
      matchLabels:
        telemetry.ai-multicloud-k8s/enabled: "true"
    podMonitorNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: platform
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    storageSpec:
      emptyDir: {}
