apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-observability-policy-manager
  namespace: platform
rules:
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - podmonitors
      - prometheusrules
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - telemetry.istio.io
    resources:
      - telemetries
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-observability-policy-manager
  namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-observability-policy-manager
subjects:
  - kind: ServiceAccount
    name: argocd-application-controller
    namespace: argocd
