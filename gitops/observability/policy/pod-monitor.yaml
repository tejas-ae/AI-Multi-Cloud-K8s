apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: platform-api-istio
  namespace: platform
  labels:
    telemetry.ai-multicloud-k8s/enabled: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-api
  podMetricsEndpoints:
    - port: http-envoy-prom
      path: /stats/prometheus
      interval: 15s
      scrapeTimeout: 10s
